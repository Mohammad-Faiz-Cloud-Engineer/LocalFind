<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Offline - LocalFind</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="assets/images/mainlogo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bg-primary: #0A0E17;
      --accent-primary: #FF8A00;
      --accent-primary-hover: #FFB366;
      --accent-secondary: #E52E71;
      --accent-danger: #FF3B30;
      --accent-success: #34C759;
      --text-primary: #FFFFFF;
      --text-muted: #B8BFC8;
      --shadow-glow: 0 0 40px rgba(255, 138, 0, 0.25);
      --shadow-glow-hover: 0 0 60px rgba(255, 138, 0, 0.4);
      --radius-lg: 16px;
      --radius-full: 9999px;
      --font-sans: 'DM Sans', 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Syne', 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(255, 138, 0, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(229, 46, 113, 0.04) 0%, transparent 50%);
      animation: gradientShift 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-3%, -3%) rotate(3deg); }
    }

    .container {
      text-align: center;
      max-width: 600px;
      width: 100%;
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 1;
    }

    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(40px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    /* Signal icon */
    .signal-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 48px;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .signal-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255, 138, 0, 0.15) 0%, transparent 70%);
      pointer-events: none;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { 
        opacity: 0.4;
        transform: translate(-50%, -50%) scale(1);
      }
      50% { 
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }

    .signal-svg {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 20px rgba(255, 138, 0, 0.3));
    }

    .signal-svg path {
      stroke: var(--accent-primary);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      opacity: 0;
      animation: signalFade 2s ease-in-out infinite;
    }

    .signal-svg path:nth-child(1) { animation-delay: 0s; }
    .signal-svg path:nth-child(2) { animation-delay: 0.15s; }
    .signal-svg path:nth-child(3) { animation-delay: 0.3s; }
    .signal-svg path:nth-child(4) { animation-delay: 0.45s; }
    .signal-svg path:nth-child(5) { animation-delay: 0.6s; }

    @keyframes signalFade {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    h1 {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 800;
      margin-bottom: 20px;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 138, 0, 0.3)); }
      50% { filter: drop-shadow(0 0 30px rgba(255, 138, 0, 0.5)); }
    }

    .subtitle {
      font-size: 19px;
      color: var(--text-muted);
      margin-bottom: 56px;
      line-height: 1.6;
      font-weight: 500;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Primary button */
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-primary-hover) 100%);
      color: #0A0E17;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: var(--font-sans);
      box-shadow: var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }

    .retry-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.6s;
    }

    .retry-btn:hover::before {
      left: 100%;
    }

    .retry-btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: var(--shadow-glow-hover);
    }

    .retry-btn:active {
      transform: translateY(-2px) scale(1);
    }

    .retry-btn:focus-visible {
      outline: 2px solid var(--accent-primary);
      outline-offset: 4px;
    }

    .retry-btn svg {
      width: 18px;
      height: 18px;
      position: relative;
      z-index: 1;
    }

    /* Status indicator */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-full);
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 40px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-danger);
      border-radius: 50%;
      animation: statusPulse 2s infinite;
      box-shadow: 0 0 12px var(--accent-danger);
    }

    @keyframes statusPulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(0.85);
      }
    }

    .status.online .status-dot {
      background: var(--accent-success);
      box-shadow: 0 0 12px var(--accent-success);
      animation: none;
    }

    /* Responsive */
    @media (max-width: 640px) {
      h1 {
        font-size: 40px;
      }

      .subtitle {
        font-size: 17px;
        margin-bottom: 48px;
      }

      .signal-icon {
        width: 100px;
        height: 100px;
        margin-bottom: 40px;
      }

      .retry-btn {
        width: 100%;
        justify-content: center;
        padding: 16px 32px;
      }

      .status {
        padding: 14px 24px;
        font-size: 15px;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .container,
      .signal-icon,
      .signal-glow,
      .status-dot,
      body::before,
      h1 {
        animation: none;
      }
      
      .signal-svg path {
        opacity: 0.8;
        animation: none;
      }

      .signal-svg {
        filter: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="signal-icon">
      <div class="signal-glow"></div>
      <svg class="signal-svg" viewBox="0 0 24 24" fill="none">
        <path d="M2 20h.01"/>
        <path d="M7 20v-4"/>
        <path d="M12 20v-8"/>
        <path d="M17 20V8"/>
        <path d="M22 4v16"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p class="subtitle">Please check your internet connection and try again.</p>

    <button class="retry-btn" id="retry-btn" aria-label="Retry connection">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Try Again
    </button>

    <div class="status" id="status" role="status" aria-live="polite">
      <span class="status-dot" aria-hidden="true"></span>
      <span>No connection</span>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const retryBtn = document.getElementById('retry-btn');

    if (retryBtn) {
      retryBtn.addEventListener('click', () => {
        window.location.reload();
      });
    }

    function updateStatus() {
      if (navigator.onLine) {
        statusEl.classList.add('online');
        const statusText = statusEl.querySelector('span:last-child');
        if (statusText) {
          statusText.textContent = 'Connected';
        }
        setTimeout(() => window.location.reload(), 600);
      } else {
        statusEl.classList.remove('online');
        const statusText = statusEl.querySelector('span:last-child');
        if (statusText) {
          statusText.textContent = 'No connection';
        }
      }
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
  </script>
</body>
</html>
