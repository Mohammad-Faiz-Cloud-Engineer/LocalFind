  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <meta name="description" content="Explore research papers by Mohammad Faiz on brain health, cognitive science, and environmental impacts on neurological function.">
  <meta name="keywords" content="research papers, brain fog, LED light, neuroscience, cognitive health, Mohammad Faiz">
  <link rel="canonical" href="https://mohammad-faiz-cloud-engineer.github.io/LocalFind/research-papers.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">

  <meta property="og:title" content="Research Papers — LocalFind">
  <meta property="og:description" content="Explore research papers on brain health and cognitive science.">
  <meta property="og:image" content="https://mohammad-faiz-cloud-engineer.github.io/LocalFind/assets/images/og-image.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/mainlogo.svg">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LocalFind">
  <link rel="apple-touch-icon" href="assets/images/mainlogo.svg">
  <meta name="theme-color" content="#FF8A00">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/research-papers.css">
</head>

<body>
  <noscript>
    <div style="position:fixed;top:0;left:0;right:0;background:#ff4444;color:#fff;padding:16px;text-align:center;z-index:9999;font-family:sans-serif;">
      <strong>JavaScript Required:</strong> This application requires JavaScript to function. Please enable JavaScript in your browser settings.
    </div>
  </noscript>
  
  <header id="site-header"></header>

  <main class="container">
    <!-- Hero Section -->
    <section class="research-hero">
      <h1>Research Papers</h1>
      <p>Exploring the frontiers of brain health, cognitive science, and environmental neuroscience</p>
    </section>

    <!-- Papers Grid -->
    <section class="papers-section">
      <div id="papers-grid" class="papers-grid">
        <!-- Papers will be dynamically loaded here -->
      </div>
    </section>

    <!-- Empty State (shown if no papers) -->
    <div id="empty-state" class="empty-state" style="display: none;">
      <i class="fa-solid fa-file-lines" style="font-size: 64px; color: var(--text-muted); margin-bottom: 20px;"></i>
      <h3>No Research Papers Available</h3>
      <p>Check back soon for new publications.</p>
    </div>
  </main>

  <!-- Paper Modal -->
  <div id="paper-modal" class="paper-modal" role="dialog" aria-label="Research paper viewer" aria-hidden="true">
    <div class="paper-modal-overlay"></div>
    <div class="paper-modal-content">
      <div class="paper-modal-header">
        <h2 id="modal-title">Paper Title</h2>
        <button class="paper-modal-close" aria-label="Close paper viewer">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="paper-modal-body" id="modal-body">
        <!-- Paper content will be loaded here -->
      </div>
    </div>
  </div>

  <footer id="site-footer"></footer>

  <script defer src="js/config.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/research-papers.js"></script>
  <script defer src="js/pwa.js"></script>
</body>

</html>
